name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend Image bauen
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/m324_nataliaanina-frontend:latest ./frontend

      - name: Frontend Image pushen
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/m324_nataliaanina-frontend:latest

      - name: Backend Image bauen
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/m324_nataliaanina-backend:latest ./backend

      - name: Backend Image pushen
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/m324_nataliaanina-backend:latest